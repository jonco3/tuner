<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guitar Tuner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1>Guitar Tuner</h1>
  <div class="controls">
    <button id="start">Start</button>
    <button id="stop">Stop</button>
  </div>
  <div id="note">&mdash;</div>
  <div id="freq"></div>
  <div id="status"></div>
  <canvas id="meter"></canvas>
  <div id="level">
    <div id="levelTrack"><div id="levelFill"></div></div>
    <div id="levelThreshold"></div>
  </div>
  <div id="levelLabel">
    <span id="levelText">Input: -&infin; dB</span>
    <span id="thresholdText">Threshold: -40 dB</span>
  </div>
</main>
<script src="tuner.js"></script>
</body>
</html>
